<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Civil Works Estimator</title>
<meta name="theme-color" content="#1e3a5f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CivilEstimator">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div class="topbar"><h1>Loading…</h1></div>
</div>

<!-- Third-party libraries (loaded from CDN, cached offline by the service worker after first successful load) -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<!-- App scripts -->
<script src="js/boq-template.js"></script>
<script src="js/db.js"></script>
<script src="js/calc.js"></script>
<script src="js/camera.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch((err) => {
        console.warn("Service worker registration failed:", err);
      });
    });
  }
</script>
</body>
</html>
